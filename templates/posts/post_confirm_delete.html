{% extends 'base.html' %}

{% block title %}Удалить пост — Igrovorot{% endblock %}

{% block content %}
<div class="post-delete">
    <h1>Удалить пост</h1>
    <p>Вы уверены, что хотите удалить пост <strong>{{ post.title }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit">Удалить</button>
            <a href="{% url 'post_detail' post.pk %}">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
