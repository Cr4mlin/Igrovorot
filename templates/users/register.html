{% extends 'base.html' %}
{% block content %}
<h2>Регистрация</h2>
{% if messages %}
  {% for message in messages %}
    <p>{{ message }}</p>
  {% endfor %}
{% endif %}
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Зарегистрироваться</button>
</form>
<a href="{% url 'login' %}">Уже есть аккаунт?</a>
{% endblock %}
